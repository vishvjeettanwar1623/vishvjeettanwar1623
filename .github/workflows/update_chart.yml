name: Auto Update GitHub Contribution Chart

on:
  schedule:
    # Runs daily at midnight 12:00 AM UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  update-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Updated Contribution SVG
        run: python scripts/update_chart.py

      - name: Commit & Push Updated SVG Chart
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/contribution_zoomin.svg
          if git diff --staged --quiet; then
            echo "No changes in contribution chart."
          else
            git commit -m "Auto-update contribution SVG chart [skip ci]"
            git push
          fi
