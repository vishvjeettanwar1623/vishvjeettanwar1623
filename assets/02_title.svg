<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 65" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&amp;display=swap');
      .bg { fill: #0d1117; }
      .title-text {
        font-family: 'JetBrains Mono', 'DM Mono', monospace;
        font-weight: 500;
        font-size: 19px;
        fill: #e6edf3;
        letter-spacing: 8px;
        text-anchor: middle;
      }
      .accent-dot-cyan { fill: #58a6ff; }
      .accent-dot-green { fill: #7ee787; }
      .dim-line {
        stroke: #30363d;
        stroke-width: 1;
        stroke-dasharray: 4 4;
      }
    </style>
  </defs>

  <rect class="bg" width="800" height="65" rx="6" stroke="#30363d" stroke-width="1" />

  <!-- Lines & Dot Accents -->
  <line x1="80" y1="32" x2="230" y2="32" class="dim-line" />
  <circle cx="235" cy="32" r="3.5" class="accent-dot-cyan" />
  
  <text x="404" y="39" class="title-text">BUILDER &amp; DESIGNER</text>

  <circle cx="565" cy="32" r="3.5" class="accent-dot-green" />
  <line x1="570" y1="32" x2="720" y2="32" class="dim-line" />
  
  <!-- Subtle accent line -->
  <line x1="380" y1="50" x2="420" y2="50" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" />
</svg>
