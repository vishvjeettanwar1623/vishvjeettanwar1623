<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;display=swap');

      .bg { fill: #0d0b0a; }

      .section-header {
        font-family: 'JetBrains Mono', 'DM Mono', monospace;
        font-size: 13px;
        font-weight: 700;
        fill: #b4544a;
        letter-spacing: 3px;
      }

      .card-border {
        stroke: #f0ede6;
        stroke-opacity: 0.3;
        stroke-width: 1.5;
        fill: #0d0b0a;
        rx: 6;
      }

      .stat-label {
        font-family: 'JetBrains Mono', 'DM Mono', monospace;
        font-size: 12px;
        fill: #f0ede6;
        opacity: 0.75;
      }

      .stat-val {
        font-family: 'JetBrains Mono', 'DM Mono', monospace;
        font-size: 14px;
        font-weight: 700;
        fill: #f0ede6;
      }

      .accent-val {
        font-family: 'JetBrains Mono', 'DM Mono', monospace;
        font-size: 14px;
        font-weight: 700;
        fill: #b4544a;
      }

      .bar-bg {
        fill: #1c1816;
        rx: 3;
      }

      .bar-fill {
        fill: #b4544a;
        rx: 3;
      }

      .bar-fill-dim {
        fill: #f0ede6;
        opacity: 0.4;
        rx: 3;
      }
    </style>
  </defs>

  <rect class="bg" width="800" height="200" rx="8" />

  <!-- Section Header -->
  <text x="40" y="30" class="section-header">// PROFILE METRICS &amp; LANGUAGE DISTRIBUTION</text>
  <line x1="430" y1="25" x2="760" y2="25" stroke="#f0ede6" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 4" />

  <!-- CARD 1: OVERVIEW STATS -->
  <g transform="translate(40, 48)">
    <rect class="card-border" width="225" height="130" />
    <text x="16" y="24" class="accent-val" font-size="12">OVERVIEW</text>
    <line x1="16" y1="32" x2="209" y2="32" stroke="#b4544a" stroke-width="1" />

    <text x="16" y="52" class="stat-label">Total Commits:</text>
    <text x="209" y="52" class="stat-val" text-anchor="end">2,842</text>

    <text x="16" y="74" class="stat-label">Pull Requests:</text>
    <text x="209" y="74" class="stat-val" text-anchor="end">314</text>

    <text x="16" y="96" class="stat-label">Issues Resolved:</text>
    <text x="209" y="96" class="stat-val" text-anchor="end">188</text>

    <text x="16" y="118" class="stat-label">Total Stars:</text>
    <text x="209" y="118" class="accent-val" text-anchor="end">620+</text>
  </g>

  <!-- CARD 2: TOP LANGUAGES -->
  <g transform="translate(285, 48)">
    <rect class="card-border" width="230" height="130" />
    <text x="16" y="24" class="accent-val" font-size="12">MOST USED LANGUAGES</text>
    <line x1="16" y1="32" x2="214" y2="32" stroke="#b4544a" stroke-width="1" />

    <!-- TypeScript 42% -->
    <text x="16" y="52" class="stat-label">TypeScript</text>
    <rect class="bar-bg" x="100" y="44" width="80" height="8" />
    <rect class="bar-fill" x="100" y="44" width="34" height="8" />
    <text x="214" y="52" class="stat-val" font-size="11" text-anchor="end">42%</text>

    <!-- Rust 26% -->
    <text x="16" y="74" class="stat-label">Rust</text>
    <rect class="bar-bg" x="100" y="66" width="80" height="8" />
    <rect class="bar-fill" x="100" y="66" width="21" height="8" />
    <text x="214" y="74" class="stat-val" font-size="11" text-anchor="end">26%</text>

    <!-- Go 18% -->
    <text x="16" y="96" class="stat-label">Go</text>
    <rect class="bar-bg" x="100" y="88" width="80" height="8" />
    <rect class="bar-fill-dim" x="100" y="88" width="14" height="8" />
    <text x="214" y="96" class="stat-val" font-size="11" text-anchor="end">18%</text>

    <!-- Python 14% -->
    <text x="16" y="118" class="stat-label">Python</text>
    <rect class="bar-bg" x="100" y="110" width="80" height="8" />
    <rect class="bar-fill-dim" x="100" y="110" width="11" height="8" />
    <text x="214" y="118" class="stat-val" font-size="11" text-anchor="end">14%</text>
  </g>

  <!-- CARD 3: COMMIT STREAK -->
  <g transform="translate(535, 48)">
    <rect class="card-border" width="225" height="130" />
    <text x="16" y="24" class="accent-val" font-size="12">ACTIVITY STREAK</text>
    <line x1="16" y1="32" x2="209" y2="32" stroke="#b4544a" stroke-width="1" />

    <text x="16" y="58" class="stat-label">Current Streak:</text>
    <text x="209" y="58" class="accent-val" font-size="16" text-anchor="end">48 Days</text>

    <line x1="16" y1="72" x2="209" y2="72" stroke="#f0ede6" stroke-opacity="0.15" stroke-dasharray="3 3" />

    <text x="16" y="98" class="stat-label">Longest Streak:</text>
    <text x="209" y="98" class="stat-val" font-size="14" text-anchor="end">182 Days</text>

    <text x="16" y="118" class="stat-label">Active Days:</text>
    <text x="209" y="118" class="stat-val" font-size="12" text-anchor="end">94.2%</text>
  </g>
</svg>
