<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 110" width="100%" height="100%">
  <defs>
    <style>
      .floating-skills {
        animation: subtleFloat 4s ease-in-out infinite;
        transform-origin: center;
      }
      @keyframes subtleFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }
    </style>
  </defs>
  <g class="floating-skills">
    <image href="https://skillicons.dev/icons?i=ts,js,react,nextjs,nodejs,express,mongodb,py,solidity,html,css,tailwind,postgres,redis,docker,git,github,vscode,linux&amp;perline=10" width="800" height="110" />
  </g>
</svg>
